# ReadTheDocs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py
  builder: html

# Python requirements to install for documentation building.
# Install docs deps first (ensures sphinx-autodoc-typehints etc.), then the package.
python:
  install:
    - requirements: docs/requirements.txt
    - path: .
      extra_requirements:
        - docs

# Set default branch for Community docs (latest = main)
defaults:
  branches:
    latest: main

# Optional: Additional build commands (if needed)
# build:
#   commands:
#     - cd docs && sphinx-apidoc -o api ../smrforge --separate --module-first

# Optional: Environment variables
# environment:
#   VARIABLE_NAME: value

# Optional: Submodules (if using git submodules)
# submodules:
#   recursive: true

