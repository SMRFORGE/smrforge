# Coverage config for table 269-291 modules only.
# Use: pytest tests/ --cov=smrforge --cov-config=coverage_table_269_291.ini
# Table modules are NOT omitted; all others match pytest.ini.
# Goal: each table 269-291 module >80%.

[coverage:run]
source = smrforge
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    */gui/*
    */visualization/*
    */examples/*
    */cli.py
    */convenience/transients.py
    */safety/transients.py
    */uncertainty/uq.py
    */core/endf_parser.py
    */core/endf_extractors.py
    */core/thermal_scattering_parser.py
    */core/photon_parser.py
    */core/gamma_production_parser.py
    */core/energy_angle_parser.py
    */core/fission_yield_parser.py
    */core/decay_parser.py
    */core/temperature_interpolation.py
    # Table 269-291 modules NOT omitted (measured for >80% target)

[coverage:report]
fail_under = 0
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
