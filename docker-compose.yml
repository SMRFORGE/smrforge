services:
  smrforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: smrforge:latest
    container_name: smrforge
    volumes:
      # Mount your data directory
      - ./data:/app/data:rw
      # Mount output directory
      - ./output:/app/output:rw
      # Mount examples (for development)
      - ./examples:/app/examples:ro
      # Optional: mount source code for development
      # - ./smrforge:/app/smrforge:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    # Override command to run interactively
    stdin_open: true
    tty: true
    # Or run a specific script
    # command: python examples/complete_integration_example.py

  smrforge-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: smrforge:dev
    container_name: smrforge-dev
    volumes:
      - ./:/app:rw
      - ./data:/app/data:rw
      - ./output:/app/output:rw
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    # Install dev dependencies
    command: bash -c "pip install -e '.[dev]' && bash"

  # Alternative service with optional OpenMC (use if main build fails)
  smrforge-no-openmc:
    build:
      context: .
      dockerfile: Dockerfile.optional-openmc
    image: smrforge:no-openmc
    container_name: smrforge-no-openmc
    volumes:
      - ./data:/app/data:rw
      - ./output:/app/output:rw
      - ./examples:/app/examples:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true

