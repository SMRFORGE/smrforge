services:
  smrforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: smrforge:latest
    # Avoid pinning container_name to prevent name collisions across projects.
    volumes:
      # Mount your data directory
      - ./data:/app/data:rw
      # Mount output directory
      - ./output:/app/output:rw
      # Persist example outputs/artifacts
      - ./results:/app/results:rw
      # Mount examples (for development)
      - ./examples:/app/examples:ro
      # Optional: mount source code for development
      # - ./smrforge:/app/smrforge:ro
      # Mount local ENDF data directory for bulk storage
      # Configure the host directory via environment variable:
      #   SMRFORGE_ENDF_HOST_DIR=/path/to/ENDF-B-VIII.1
      # If unset, defaults to ./data/endf-data (create/mount as needed).
      - ${SMRFORGE_ENDF_HOST_DIR:-./data/endf-data}:/app/endf-data:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - SMRFORGE_ENDF_DIR=/app/endf-data
      # Note: Also supports configuration file: ~/.smrforge/config.yaml
      # Dashboard available at http://localhost:8050
    ports:
      - "8050:8050"
    command: smrforge serve --host 0.0.0.0 --port 8050

  smrforge-pro:
    build:
      context: .
      dockerfile: Dockerfile.pro
    image: smrforge-pro:latest
    volumes:
      - ./data:/app/data:rw
      - ./output:/app/output:rw
      - ./results:/app/results:rw
      - ./examples:/app/examples:ro
      - ${SMRFORGE_ENDF_HOST_DIR:-./data/endf-data}:/app/endf-data:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - SMRFORGE_ENDF_DIR=/app/endf-data
      - SMRFORGE_TIER=pro
    ports:
      - "8051:8050"
    command: smrforge serve --host 0.0.0.0 --port 8050

  smrforge-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: smrforge:dev
    # Avoid pinning container_name to prevent name collisions across projects.
    volumes:
      - ./:/app:rw
      - ./data:/app/data:rw
      - ./output:/app/output:rw
      - ./results:/app/results:rw
      - ./examples:/app/examples:ro
      # Mount tests directory for development
      - ./tests:/app/tests:ro
      # Mount local ENDF data directory for bulk storage
      - ${SMRFORGE_ENDF_HOST_DIR:-./data/endf-data}:/app/endf-data:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - SMRFORGE_ENDF_DIR=/app/endf-data
      # Note: Also supports configuration file: ~/.smrforge/config.yaml
      # Dashboard will be available at http://localhost:8050 when running
    stdin_open: true
    tty: true
    # Expose dashboard port (8050) and Jupyter port (8888)
    ports:
      - "8050:8050"
      - "8888:8888"
    # Install dev dependencies on startup
    # - pytest-asyncio: Required for async test support (async edge case tests)
    # - ipython: Enhanced interactive shell for smrforge shell command
    # - h5py: Required for burnup checkpointing functionality
    # Data downloader dependencies (tqdm, pyyaml, rich) are already in requirements.txt
    # CLI dependencies (rich, pyyaml) are already in requirements.txt
    # Rich logging: Colorized console output (level colors, rich tracebacks). Set NO_COLOR=1 to disable.
    # Visualization dependencies (plotly, pyvista, dash) are now required and included automatically
    # Parameter sweep dependencies (pandas) are already in requirements.txt
    # Performance optimizations: Numba JIT compilation requires build-essential and python3-dev (already included)
    # Temperature interpolation: scipy.interpolate.RectBivariateSpline (included in scipy)
    # Self-shielding: All dependencies included in requirements.txt
    # Test suite (5001 tests, 44 skipped) includes:
    #   - Phase 1/2 module tests: parameter_sweep, templates, constraints, converters, checkpointing
    #   - Advanced error handling: file operations, copy failures, validation errors
    #   - Test data generator: testing/generate_test_data.py creates mock data for visualization and sweep tests
    #   - Async edge cases: partial failures, exception propagation, timeouts, concurrent access
    #   - Manual testing framework: 13 test scripts (test_*.py) in testing/ directory for feature validation
    #   - Optional Jupyter notebooks available for interactive testing (01_CLI_Commands.ipynb)
#   - Quick start validation guide: docs/validation/QUICK_START_VALIDATION.md for ENDF validation testing
#   - API Style Guide: docs/guides/API_STYLE_GUIDE.md (comprehensive API design guidelines)
#   - API Consistency Report: docs/status/API_CONSISTENCY_REPORT.md (detailed API analysis)
#   - Performance profiling: scripts/profile_performance.py, run_performance_profile.sh; see docs/development/memory-and-performance-assessment.md.
# Optional: Add mesh conversion and CAD import: pip install meshio trimesh
    # Optional: Add parquet support: pip install pyarrow or fastparquet
    # Image already has dev deps installed; drop into an interactive shell.
    command: ["/bin/bash"]

