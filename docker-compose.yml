services:
  smrforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: smrforge:latest
    container_name: smrforge
    volumes:
      # Mount your data directory
      - ./data:/app/data:rw
      # Mount output directory
      - ./output:/app/output:rw
      # Mount examples (for development)
      - ./examples:/app/examples:ro
      # Optional: mount source code for development
      # - ./smrforge:/app/smrforge:ro
      # Mount local ENDF data directory for bulk storage
      # Uncomment and set path to your ENDF data directory:
      # For Windows (adjust path as needed):
      # - C:/Users/YourName/ENDF-Data:/app/endf-data:ro
      - C:/Users/cmwha/Downloads/ENDF-B-VIII.1:/app/endf-data:ro
      # For Linux/Mac:
      # - ~/ENDF-Data:/app/endf-data:ro
      # - /path/to/ENDF-B-VIII.1:/app/endf-data:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      # Optional: set custom ENDF directory path
      # - SMRFORGE_ENDF_DIR=/app/endf-data
      # Note: Also supports configuration file: ~/.smrforge/config.yaml
      # Dashboard will be available at http://localhost:8050 when running
    # Keep container running for exec commands
    stdin_open: true
    tty: true
    # Expose dashboard port (8050)
    ports:
      - "8050:8050"
    command: tail -f /dev/null
    # Or run a specific script
    # command: python examples/complete_integration_example.py
    # Or run the dashboard:
    # command: smrforge serve --host 0.0.0.0 --port 8050

  smrforge-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: smrforge:dev
    container_name: smrforge-dev
    volumes:
      - ./:/app:rw
      - ./data:/app/data:rw
      - ./output:/app/output:rw
      - ./examples:/app/examples:ro
      # Mount tests directory for development
      - ./tests:/app/tests:ro
      # Mount local ENDF data directory for bulk storage
      # Uncomment and set path to your ENDF data directory:
      # For Windows (adjust path as needed):
      # - C:/Users/YourName/ENDF-Data:/app/endf-data:ro
      - C:/Users/cmwha/Downloads/ENDF-B-VIII.1:/app/endf-data:ro
      # For Linux/Mac:
      # - ~/ENDF-Data:/app/endf-data:ro
      # - /path/to/ENDF-B-VIII.1:/app/endf-data:ro
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      # Optional: set custom ENDF directory path
      # - SMRFORGE_ENDF_DIR=/app/endf-data
      # Note: Also supports configuration file: ~/.smrforge/config.yaml
      # Dashboard will be available at http://localhost:8050 when running
    stdin_open: true
    tty: true
    # Expose dashboard port (8050)
    ports:
      - "8050:8050"
    # Install dev dependencies on startup (including pytest-asyncio for async tests)
    # Data downloader dependencies (tqdm, pyyaml) are already in requirements.txt
    # Visualization dependencies (plotly, pyvista, dash) are now required and included automatically
    # Optional: Add mesh conversion and CAD import: pip install meshio trimesh
    command: bash -c "pip install -e '.[dev]' && pip install pytest-asyncio && bash"

