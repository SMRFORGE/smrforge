[pytest]
# Pytest configuration for SMRForge

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
# Use -n auto for parallel execution (requires pytest-xdist)
# Remove -n auto if you want sequential execution
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    # Parallel execution (comment out if you want sequential)
    # -n auto

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_sandy: marks tests that require SANDY

# Coverage options (if pytest-cov is installed)
[coverage:run]
source = smrforge
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    # Exclude GUI and visualization from coverage (hard to test, not critical)
    */gui/*
    */visualization/*
    # Exclude examples
    */examples/*
    # Exclude CLI (already well tested separately)
    */cli.py
    # Exclude optional/integration modules
    */convenience/transients.py
    */safety/transients.py
    */uncertainty/uq.py
    # Exclude large parser files (tested separately)
    */core/endf_parser.py
    */core/endf_extractors.py
    */core/thermal_scattering_parser.py
    */core/photon_parser.py
    */core/gamma_production_parser.py
    */core/energy_angle_parser.py
    */core/fission_yield_parser.py
    */core/decay_parser.py
    # Exclude temperature interpolation (tested separately)
    */core/temperature_interpolation.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

