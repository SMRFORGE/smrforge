# Build and publish to PyPI on version tags (e.g. v0.1.0).
# Requires PyPI API token in repo secrets: PYPI_API_TOKEN or TWINE_PASSWORD.

name: Release (PyPI)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (for workflow check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check workflows enabled (global + feature release)
        id: check
        run: python3 scripts/github_workflow_check.py release

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip wheel setuptools build
      - name: Build package
        run: python -m build
      - name: Check package
        run: |
          pip install twine
          twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [check-enabled, build]
    if: needs.check-enabled.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
