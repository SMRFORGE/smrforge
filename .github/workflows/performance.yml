# Performance benchmarks (time + memory). Excluded from default pytest; run on schedule or manually.
# See docs/development/performance-and-benchmarking-assessment.md.

name: Performance benchmarks

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f .github/workflows-enabled ]; then
            E=$(cat .github/workflows-enabled | tr -d '[:space:]')
            [ "$E" = "true" ] && echo "enabled=true" >> $GITHUB_OUTPUT || echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

  performance:
    name: Run performance benchmarks
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git

      - name: Upgrade pip, wheel, setuptools
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install dependencies
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
          pip install -e ".[dev]"

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/test_performance_benchmarks.py \
            --run-performance -v \
            --override-ini "addopts=-v --strict-markers --tb=short -ra" \
            -m performance
