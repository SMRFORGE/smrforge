# Scheduled full test run (and optional manual trigger).
# Runs full test matrix, coverage, and validation when enabled.

name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (for workflow check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check workflows enabled (global + feature nightly)
        id: check
        run: python3 scripts/github_workflow_check.py nightly

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      - name: Upgrade pip, wheel, setuptools
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install core dependencies
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      - name: Try to install OpenMC (optional)
        continue-on-error: true
        run: pip install --no-cache-dir openmc>=0.13.0 || true
      - name: Install SMRForge
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=smrforge --cov-report=xml --cov-report=term-missing -v --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: nightly
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install lint deps
        run: pip install black flake8 isort
      - name: Black
        run: black --check --diff smrforge/ tests/
      - name: isort
        run: isort --check-only --diff smrforge/ tests/
      - name: flake8
        run: flake8 smrforge/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Build
        run: |
          python -m pip install --upgrade pip wheel setuptools build
          python -m build
          pip install twine
          twine check dist/*
