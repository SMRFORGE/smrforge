name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      
      - name: Upgrade pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      
      - name: Install core dependencies (without OpenMC)
        run: |
          # Create requirements without OpenMC for faster builds
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      
      - name: Try to install OpenMC (optional)
        continue-on-error: true
        run: |
          pip install --no-cache-dir openmc>=0.13.0 || \
            echo "WARNING: OpenMC installation failed, continuing without it"
      
      - name: Install SMRForge
        run: |
          pip install -e ".[dev]"
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --color=yes
      
      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=smrforge --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  validation:
    name: Validation Tests (ENDF)
    runs-on: ubuntu-latest
    # Only run on main branch or if validation files are available
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      
      - name: Upgrade pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      
      - name: Install core dependencies (without OpenMC)
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      
      - name: Try to install OpenMC (optional)
        continue-on-error: true
        run: |
          pip install --no-cache-dir openmc>=0.13.0 || \
            echo "WARNING: OpenMC installation failed, continuing without it"
      
      - name: Install SMRForge
        run: |
          pip install -e ".[dev]"
      
      - name: Run validation tests (will skip if ENDF files not available)
        continue-on-error: true
        run: |
          pytest tests/test_validation_comprehensive.py \
            tests/test_endf_workflows_e2e.py \
            -v --tb=short --color=yes || \
            echo "Validation tests skipped or failed (ENDF files may not be available)"
      
      - name: Run validation benchmarks (optional)
        continue-on-error: true
        run: |
          pytest tests/validation_benchmarks.py -v --tb=short || \
            echo "Validation benchmarks skipped (ENDF files may not be available)"

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install linting dependencies
        run: |
          pip install black flake8 mypy isort
      
      - name: Check code formatting with Black
        run: |
          black --check --diff smrforge/ tests/
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff smrforge/ tests/
        continue-on-error: true
      
      - name: Run flake8
        run: |
          flake8 smrforge/ tests/ --max-line-length=88 --extend-ignore=E203,W503
        continue-on-error: true
      
      - name: Run mypy type checking
        run: |
          mypy smrforge/ --ignore-missing-imports || true
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install security tools
        run: |
          pip install pip-audit bandit[toml]
      
      - name: Install SMRForge dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          python -m pip_audit --desc --format json --output pip_audit.json || true
        continue-on-error: true
      
      - name: Run bandit (code security analysis)
        run: |
          python -m bandit -r smrforge/ -f json -o bandit.json -ll || true
        continue-on-error: true
      
      - name: Run security audit script
        run: |
          python scripts/security_audit.py --format both --output-dir security_reports || true
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security_reports/
          retention-days: 30

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools build
      
      - name: Build package
        run: |
          python -m build
      
      - name: Check package contents
        run: |
          pip install twine
          twine check dist/*

