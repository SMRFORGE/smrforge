name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python (for workflow check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check workflows enabled (global + feature ci)
        id: check
        run: python3 scripts/github_workflow_check.py ci
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      
      - name: Upgrade pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      
      - name: Install core dependencies (without OpenMC)
        run: |
          # Create requirements without OpenMC for faster builds
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      
      - name: Try to install OpenMC (optional)
        continue-on-error: true
        run: |
          pip install --no-cache-dir openmc>=0.13.0 || \
            echo "WARNING: OpenMC installation failed, continuing without it"
      
      - name: Install SMRForge
        run: |
          pip install -e ".[dev]"
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --color=yes
      
      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=smrforge --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  validation:
    name: Validation Tests (ENDF)
    runs-on: ubuntu-latest
    needs: check-enabled
    # Only run on main branch or if validation files are available, and if workflows are enabled
    if: (needs.check-enabled.outputs.enabled == 'true') && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      
      - name: Upgrade pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      
      - name: Install core dependencies (without OpenMC)
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      
      - name: Try to install OpenMC (optional)
        continue-on-error: true
        run: |
          pip install --no-cache-dir openmc>=0.13.0 || \
            echo "WARNING: OpenMC installation failed, continuing without it"
      
      - name: Install SMRForge
        run: |
          pip install -e ".[dev]"
      
      - name: Run validation tests (will skip if ENDF files not available)
        continue-on-error: true
        run: |
          pytest tests/test_validation_comprehensive.py \
            tests/test_endf_workflows_e2e.py \
            -v --tb=short --color=yes || \
            echo "Validation tests skipped or failed (ENDF files may not be available)"
      
      - name: Run validation benchmarks (optional)
        continue-on-error: true
        run: |
          pytest tests/validation_benchmarks.py -v --tb=short || \
            echo "Validation benchmarks skipped (ENDF files may not be available)"
      
      - name: Run validation runner with benchmarks (if available)
        continue-on-error: true
        env:
          LOCAL_ENDF_DIR: ${{ secrets.ENDF_DIR || '' }}
        run: |
          if [ -n "$LOCAL_ENDF_DIR" ] && [ -d "$LOCAL_ENDF_DIR" ]; then
            python scripts/run_validation.py \
              --endf-dir "$LOCAL_ENDF_DIR" \
              --benchmarks benchmarks/validation_benchmarks.json \
              --output validation_report.txt \
              --json-output validation_results.json || \
              echo "Validation runner completed with warnings/errors"
          else
            echo "ENDF directory not available in CI (set LOCAL_ENDF_DIR secret for full validation)"
          fi
      
      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: |
            validation_report.txt
            validation_results.json
          retention-days: 30
          if-no-files-found: ignore

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install linting dependencies
        run: |
          pip install black flake8 mypy isort
      
      - name: Check code formatting with Black
        run: |
          black --check --diff smrforge/ tests/
      
      - name: Check import sorting with isort
        run: |
          isort --check-only --diff smrforge/ tests/

      - name: Run flake8
        run: |
          flake8 smrforge/ tests/ --max-line-length=88 --extend-ignore=E203,W503
      
      - name: Run mypy type checking
        run: |
          mypy smrforge/ --ignore-missing-imports || true
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install security tools
        run: |
          pip install pip-audit bandit[toml]
      
      - name: Install SMRForge dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          python -m pip_audit --desc --format json --output pip_audit.json || true
        continue-on-error: true
      
      - name: Run bandit (code security analysis)
        run: |
          python -m bandit -r smrforge/ -f json -o bandit.json -ll || true
        continue-on-error: true
      
      - name: Run security audit script
        run: |
          python scripts/security_audit.py --format both --output-dir security_reports || true
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security_reports/
          retention-days: 30

  # Pro integration tests run in smrforge-pro repo only (https://github.com/SMRFORGE/smrforge-pro)
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools build
      
      - name: Build package
        run: |
          python -m build
      
      - name: Check package contents
        run: |
          pip install twine
          twine check dist/*

