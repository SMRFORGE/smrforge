# Run tests on Dependabot dependency PRs when the dependabot feature is enabled.
# Only runs test job when the PR author is dependabot[bot].

name: Dependabot CI

on:
  pull_request:

concurrency:
  group: dependabot-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
      is_dependabot: ${{ steps.detect.outputs.is_dependabot }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (for workflow check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check workflows enabled (global + feature dependabot)
        id: check
        run: python3 scripts/github_workflow_check.py dependabot
      - name: Detect Dependabot PR
        id: detect
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test (Dependabot)
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true' && needs.check-enabled.outputs.is_dependabot == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install core dependencies
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      - name: Try OpenMC (optional)
        continue-on-error: true
        run: pip install --no-cache-dir openmc>=0.13.0 || true
      - name: Install SMRForge
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short -x --ignore=tests/performance/
