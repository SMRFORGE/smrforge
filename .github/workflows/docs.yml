name: Build and Deploy Documentation

on:
  workflow_dispatch:  # Allow manual triggering

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check workflows enabled
        id: check
        run: |
          if [ -f .github/workflows-enabled ]; then
            ENABLED=$(cat .github/workflows-enabled | tr -d '[:space:]')
            if [ "$ENABLED" = "true" ]; then
              echo "enabled=true" >> $GITHUB_OUTPUT
            else
              echo "enabled=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

# Set permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # Install package in editable mode so autodoc can import it
          pip install -e ".[dev,docs]"
      
      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html
      
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [check-enabled, build-docs]
    if: needs.check-enabled.outputs.enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

