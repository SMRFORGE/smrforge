# Fast CI: single Python version, tests without coverage. Use for quick feedback on push/PR.

name: CI (quick)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-quick-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-enabled:
    name: Check if workflows are enabled
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no Pro air-gap files in Community
        run: python3 scripts/check_no_pro_airgap.py
      - name: Set up Python (for workflow check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check workflows enabled (global + feature ci-quick)
        id: check
        run: python3 scripts/github_workflow_check.py ci-quick

  quick-test:
    name: Quick test
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libhdf5-dev libblas-dev liblapack-dev libxml2-dev libpng-dev git
      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install core dependencies
        run: |
          grep -v "^openmc" requirements.txt > requirements-core.txt || true
          pip install --no-cache-dir -r requirements-core.txt
      - name: Try OpenMC (optional)
        continue-on-error: true
        run: pip install --no-cache-dir openmc>=0.13.0 || true
      - name: Install SMRForge
        run: pip install -e ".[dev]"
      - name: Run tests (no coverage)
        run: pytest tests/ -v --tb=short -x --ignore=tests/performance/

  quick-lint:
    name: Quick lint
    runs-on: ubuntu-latest
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install lint deps
        run: pip install black flake8
      - name: Black check
        run: black --check --diff smrforge/ tests/
      - name: flake8
        run: flake8 smrforge/ tests/ --max-line-length=88 --extend-ignore=E203,W503
