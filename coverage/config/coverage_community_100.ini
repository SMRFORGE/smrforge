# Coverage config for Community tier 100% target (in-scope modules).
# Use: pytest tests/ --cov=smrforge --cov-config=coverage/config/coverage_community_100.ini --cov-report=term-missing
# Same omits as .coveragerc; goal: 100% on measured modules.

[run]
source = smrforge
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */env/*
    setup.py
    */examples/*
    */gui/*
    */visualization/*
    */convenience/transients.py
    */safety/transients.py
    */uncertainty/uq.py
    */core/endf_parser.py
    */core/endf_extractors.py
    */core/thermal_scattering_parser.py
    */core/photon_parser.py
    */core/gamma_production_parser.py
    */core/energy_angle_parser.py
    */core/fission_yield_parser.py
    */core/decay_parser.py
    */core/temperature_interpolation.py
    */neutronics/hybrid_solver.py
    */neutronics/adaptive_sampling.py
    */neutronics/monte_carlo_optimized.py
    */neutronics/implicit_mc.py
    */geometry/advanced_import.py
    */data_downloader.py
    */geometry/validation.py
    */burnup/lwr_burnup.py
    */convenience/__init__.py
    */economics/integration.py
    */burnup/fuel_management_integration.py
    */utils/parallel_batch.py
    */control/integration.py
    */core/decay_chain_utils.py
    */core/multigroup_advanced.py
    */core/self_shielding_integration.py
    */core/endf_setup.py
    */uncertainty/visualization.py
    */mechanics/fuel_rod.py
    */cli.py

[report]
precision = 1
show_missing = True
fail_under = 90

exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    @.*protocol|@.*overload

# Exclude Numba JIT-compiled function bodies (coverage cannot instrument them)
exclude_also =
    def _doppler_broaden
    def _collapse_to_multigroup
    @njit\(
    raise NotImplementedError
    if TYPE_CHECKING:
